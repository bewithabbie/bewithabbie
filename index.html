<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<title>Be With Abbie • Breathwork & Somatics</title>
<link rel="stylesheet" href="style.css" />
<style>
.hero{text-align:center;padding:80px 24px 60px;max-width:680px;margin:0 auto}
.hero .eyebrow{font-family:'Jost',sans-serif;font-size:0.78rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
.hero h2{font-size:clamp(2rem,5vw,3rem);font-style:italic;font-weight:300;color:var(--text);line-height:1.25;margin-bottom:24px}
.hero p{font-size:1.05rem;max-width:520px;margin:0 auto 36px}
.hero-actions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.what-section{background:var(--warm-white);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:60px 24px;text-align:center}
.what-section h2{margin-bottom:12px}
.pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:32px;max-width:760px;margin:44px auto 0;text-align:left}
.pillar-icon{font-size:1.8rem;margin-bottom:12px}
.pillar h3{font-size:1.15rem;margin-bottom:8px}
.pull-quote{text-align:center;padding:64px 24px;max-width:600px;margin:0 auto}
.pull-quote blockquote{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,1.9rem);font-style:italic;font-weight:300;color:var(--sage-deep);line-height:1.5}
.pull-quote cite{display:block;margin-top:16px;font-size:0.82rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-light);font-style:normal;font-family:'Jost',sans-serif}
</style>
</head>
